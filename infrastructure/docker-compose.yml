version: "3.8"
services:
  coturn:
    image: instrumentisto/coturn:4.5.2
    container_name: coturn
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - TURN_STATIC_AUTH_SECRET=${TURN_SHARED_SECRET}
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "5349:5349/tcp"
      - "5349:5349/udp"
      - "49152-49200:49152-49200/udp"
    volumes:
      - ./coturn/coturn.conf:/etc/coturn/coturn.conf:ro

  redis:
    image: redis:7-alpine
    container_name: redis-stage
    restart: unless-stopped
    ports:
      - "6379:6379"
