name: Build & Publish Module

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root deps
        run: yarn install --frozen-lockfile

      - name: Build client
        working-directory: client
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Build server
        working-directory: server
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Generate manifest & compute hashes
        run: |
          node ./compute_manifest_hashes.cjs
        env:
          CI: true

      - name: Prepare module package
        run: |
          TIMESTAMP=$(date -u +"%Y%m%dT%H%M%SZ")
          MODULE_DIR=/tmp/module-package-${TIMESTAMP}
          mkdir -p "$MODULE_DIR"
          rsync -av --delete client/dist server/dist public ./manifest.json "$MODULE_DIR/"
          cd "$MODULE_DIR" && zip -r /tmp/kronos-module-${TIMESTAMP}.zip .

      - name: Publish module to Kronos
        env:
          KRONOS_URL: ${{ secrets.KRONOS_URL }}
          KRONOS_API_KEY: ${{ secrets.KRONOS_API_KEY }}
        run: |
          set -e
          MODULE_ZIP=$(ls /tmp/kronos-module-*.zip | tail -n 1)
          echo "Publishing $MODULE_ZIP to $KRONOS_URL"
          node ./kronos-publish.js "$(dirname "$MODULE_ZIP")" "$KRONOS_URL" "$KRONOS_API_KEY"

      - name: Upload publish logs
        uses: actions/upload-artifact@v4
        with:
          name: kronos-publish-artifacts
          path: /tmp/kronos-module-*.zip
